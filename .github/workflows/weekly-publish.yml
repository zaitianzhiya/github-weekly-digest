name: Weekly Publish

on:
  schedule:
    - cron: '17 10 * * 1'     # 每周一 UTC 10:17 = 北京时间 18:17（避开整点高峰）
  workflow_dispatch:            # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full weekly run (all tiers + deep analysis)
        run: python src/main.py --mode weekly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/state.db output/
          git diff --cached --quiet || git commit -m "Weekly report: $(date +%Y-%m-%d)"
          git push
